
[package]
authors = ["Filip Kunc <kunc.filip@gmail.com>"]
edition = "2024"
name = "wrap_esm_lambda"
version = "0.1.3"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = "3.2.4"
napi-derive = "3.2.4"
oxc = "0.82.2"
oxc_allocator = "0.82.2"
oxc_ast = "0.82.2"
oxc_codegen = "0.82.2"
oxc_parser = "0.82.2"
oxc_semantic = "0.82.2"
oxc_span = "0.82.2"
oxc_transformer = "0.82.2"
oxc_traverse = "0.82.2"

[target.'cfg(target_arch = "x86_64")'.dependencies]
ctor = "0.5.0"
frida = { version = "0.17.0", features = [ "auto-download" ] }
frida-gum = { version = "0.17.0", features = ["auto-download"] }
lazy_static = "1.5.0"
libc = "0.2.175"
libuv-sys2 = "1.51.0"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "symbols"
