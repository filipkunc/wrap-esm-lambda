
[package]
authors = ["Filip Kunc <kunc.filip@gmail.com>"]
edition = "2024"
name = "wrap_esm_lambda"
version = "0.1.2"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = "3.2.0"
napi-derive = "3.2.0"
oxc = "0.81.0"
oxc_allocator = "0.81.0"
oxc_ast = "0.81.0"
oxc_codegen = "0.81.0"
oxc_parser = "0.81.0"
oxc_semantic = "0.81.0"
oxc_span = "0.81.0"
oxc_transformer = "0.81.0"
oxc_traverse = "0.81.0"
oxc-browserslist = "=2.0.15"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "symbols"
